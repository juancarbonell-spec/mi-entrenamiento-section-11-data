# Sync Configuration for Activities and Wellness Data

schedule:
  cron: '0 6-15 * * *'

jobs:
  download_activities:
    runs-on: ubuntu-latest
    steps:
      - name: Download Activities
        run: |
          curl -o data/activities_history.json https://intervals.icu/api/v1/athlete/{athlete_id}/activities

  download_wellness:
    runs-on: ubuntu-latest
    steps:
      - name: Download Wellness Data
        run: |
          curl -o data/wellness_history.json https://intervals.icu/api/v1/athlete/{athlete_id}/wellness

  analyze_performance:
