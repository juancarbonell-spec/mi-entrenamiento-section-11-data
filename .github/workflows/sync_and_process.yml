name: Sync Box y procesar FIT

on:
  schedule:
    - cron: "0 */6 * * *"   # cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # lanzable a mano desde Actions

jobs:
  sync-y-procesar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install fitdecode pandas numpy requests

      - name: Descargar FIT nuevos desde Box
        env:
          BOX_CLIENT_ID:     ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
        run: python scripts/sync_box.py

      - name: Procesar FIT y generar CSVs
        run: python scripts/procesar_fit.py

      - name: Commit y push de resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add FIT/ data/
          git diff --cached --quiet || git commit -m "Auto: sync Box + actualizar CSVs [skip ci]"
          git push
