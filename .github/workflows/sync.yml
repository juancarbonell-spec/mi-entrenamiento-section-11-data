name: Sync Health Data to Intervals.icu

on:
  schedule:
    - cron: '0 */6 * * *' # Se ejecuta automáticamente cada 6 horas
  workflow_dispatch:      # Permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. Descarga TU propio repositorio (donde se guardarán los logs/datos si es necesario)
      - name: Checkout your repo
        uses: actions/checkout@v4

      # 2. Descarga el repositorio de la herramienta de sincronización (CrankAddict)
      - name: Checkout sync tool repository
        uses: actions/checkout@v4
        with:
          repository: CrankAddict/section-11
          path: section-11

      # 3. Configura el entorno de Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 4. Instala las dependencias necesarias del proyecto
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f section-11/requirements.txt ]; then pip install -r section-11/requirements.txt; fi

      # 5. Ejecuta el script de sincronización
      # IMPORTANTE: Asegúrate de tener los SECRETS configurados en Settings > Secrets > Actions
      - name: Run Sync Script
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          # Añade aquí otros secretos si el SETUP_ASSISTANT.md los requiere (ej. GOOGLE_DRIVE_ID)
        run: |
          python section-11/main.py
