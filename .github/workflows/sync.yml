name: Sync Intervals Data

on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta cada medianoche
  workflow_dispatch:   # Permite ejecutarlo manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Data
        env:
          INTERVALS_ID: ${{ secrets.INTERVALS_ICU_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: |
          python -c "
          import requests, os, json, base64
          from datetime import datetime, timedelta

          # Limpieza de variables
          athlete_id = ''.join(filter(str.isdigit, os.environ.get('INTERVALS_ID', '')))
          api_key = os.environ.get('INTERVALS_KEY', '').strip()

          if not athlete_id or not api_key:
              print('❌ Error: Faltan los Secrets en GitHub Settings')
              exit(1)

          # Autenticación
          auth_str = f'API_KEY:{api_key}'
          encoded_auth = base64.b64encode(auth_str.encode()).decode()
          headers = {'Authorization': f'Basic {encoded_auth}', 'Accept': 'application/json'}

          # Petición
          url = f'https://intervals.icu/api/v1/athlete/{athlete_id}/activities'
          params = {'oldest': (datetime.now() - timedelta(days=365)).strftime('%Y-%m-%d')}

          print(f'Conectando a Intervals (ID: {athlete_id})...')
          r = requests.get(url, headers=headers, params=params)

          if r.status_code == 200:
              os.makedirs('data', exist_ok=True)
              with open('data/activities_history.json', 'w') as f:
                  json.dump(r.json(), f, indent=2)
              print('✅ Sincronización completa.')
          else:
              print(f'❌ Error {r.status_code}: {r.text}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/activities_history.json
          git commit -m "Update activities data" || exit 0
          git push
