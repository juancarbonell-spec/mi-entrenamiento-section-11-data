      - name: Sync All Metrics from Intervals.icu
        run: |
          python << 'EOF'
import requests, os, json
from datetime import datetime, timedelta

athlete_id = os.environ.get("INTERVALS_ATHLETE_ID","").strip()
api_key = os.environ.get("INTERVALS_API_KEY","").strip()

if not athlete_id or not api_key:
    print("❌ ERROR: Faltan secrets en GitHub Settings")
    exit(1)

base_url = "https://intervals.icu/api/v1/athlete"

# Endpoints a sincronizar
endpoints = {
    "activities": f"{base_url}/{athlete_id}/activities",
    "sleep": f"{base_url}/{athlete_id}/sleep",
    "spo2": f"{base_url}/{athlete_id}/spo2",
    "hrv": f"{base_url}/{athlete_id}/hrv",
    "respiration": f"{base_url}/{athlete_id}/respiration",
    "steps": f"{base_url}/{athlete_id}/steps",
    "heartrate": f"{base_url}/{athlete_id}/heartrate"
}

os.makedirs("data", exist_ok=True)

for key, url in endpoints.items():
    params = {"oldest": (datetime.now()-timedelta(days=365)).strftime("%Y-%m-%d")}
    try:
        r = requests.get(url, auth=("API_KEY", api_key), params=params, timeout=30)
        if r.status_code == 200:
            with open(f"data/{key}_history.json", "w", encoding="utf-8") as f:
                json.dump(r.json(), f, indent=2, ensure_ascii=False)
            print(f"✅ {key} guardado con éxito ({len(r.json())} registros).")
        else:
            print(f"⚠️ Fallo en {key}: {r.status_code} {r.text[:100]}")
    except Exception as e:
        print(f"❌ Error de conexión para {key}: {e}")
          EOF
