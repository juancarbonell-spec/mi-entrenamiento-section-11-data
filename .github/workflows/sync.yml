name: Intervals.icu Sync

on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Data (Download Last 30 Activities)
        env:
          ID: ${{ secrets.INTERVALS_ICU_ID }}
          KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: |
          python -c "
          import requests, os, json
          from datetime import datetime, timedelta
          
          athlete_id = ''.join(filter(str.isdigit, os.environ.get('ID', '')))
          api_key = os.environ.get('KEY', '')
          
          # Definimos una fecha de inicio (hace 1 año) para asegurar que encuentre las 30 actividades
          oldest_date = (datetime.now() - timedelta(days=365)).strftime('%Y-%m-%d')
          
          url = f'https://intervals.icu/api/v1/athlete/{athlete_id}/activities'
          params = {
              'oldest': oldest_date,
              'limit': 30
          }
          
          response = requests.get(url, auth=('API_KEY', api_key), params=params)
          
          if response.status_code == 200:
              os.makedirs('data', exist_ok=True)
              with open('data/activities_history.json', 'w') as f:
                  json.dump(response.json(), f, indent=2)
              print('Sincronización exitosa.')
          else:
              print(f'Error {response.status_code}: {response.text}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Section 11 Bot"
          git config --global user.email "bot@section11.ai"
          git add .
          git commit -m "Update training history" || exit 0
          git push
