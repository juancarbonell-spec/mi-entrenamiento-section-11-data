name: Full Training Engine V7

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-and-analyze:
    runs-on: ubuntu-latest
    env:
      INTERVALS_API_KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
      INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ICU_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Full Training Engine V7 - Sync Activities
        run: |
          python << 'EOF'
          import requests, os, json
          from datetime import datetime, timedelta

          athlete_id = os.environ.get("INTERVALS_ATHLETE_ID","").strip()
          api_key = os.environ.get("INTERVALS_API_KEY","").strip()

          if not athlete_id or not api_key:
              print("❌ Faltan secrets INTERVALS")
              exit(1)

          url = f"https://intervals.icu/api/v1/athlete/{athlete_id}/activities"
          params = {"oldest": (datetime.now()-timedelta(days=365)).strftime("%Y-%m-%d")}

          r = requests.get(url, auth=("API_KEY", api_key), params=params, timeout=30)
          if r.status_code != 200:
              print("❌ Error sync:", r.text[:500])
              exit(1)

          activities = r.json()
          os.makedirs("data", exist_ok=True)
          file_path = "data/activities_history.json"
          with open(file_path,"w",encoding="utf-8") as f:
              json.dump(activities,f,indent=2,ensure_ascii=False)
          print(f"✅ {len(activities)} actividades sincronizadas")
          EOF

      - name: Generar dossier y plan avanzado
        run: |
          python << 'EOF'
          import os, json
          from datetime import datetime, timedelta

          Z4, Z5 = 148, 158
          def sec2min(s): return s/60 if s else 0

          if not os.path.exists("data/activities_history.json"):
              print("Archivo no encontrado")
              exit(1)

          with open("data/activities_history.json", "r", encoding="utf-8") as f:
              activities = json.load(f)

          runs = sorted([a for a in activities if a.get("type")=="Run"], key=lambda x: x.get("start_date",""))
          valid_runs = [r for r in runs if r.get("distance",0)/1000 >= 1 and sec2min(r.get("moving_time",0)) >= 10]

          if not valid_runs:
              print("⚠️ No hay carreras válidas")
              exit(0)

          last = valid_runs[-1]
          prev = valid_runs[-2] if len(valid_runs)>1 else last

          def analyze_run(a):
              d_km = a.get("distance",0)/1000
              t_min = sec2min(a.get("moving_time",0))
              hr = a.get("average_heartrate",0)
              pace = t_min/d_km if d_km>0 else 0
              vvo2max = d_km / (t_min/60) if t_min>0 else 0
              ec = (d_km*1000)/hr if hr>0 else 0
              return {"pace": pace, "hr": hr, "vvo2max": vvo2max, "economy": ec}

          m_l = analyze_run(last)
          m_p = analyze_run(prev)
          status = "MEJORA" if m_l['vvo2max'] >= m_p['vvo2max'] else "ESTABLE"

          dossier = (
              "# ATHLETE DOSSIER V7 AVANZADO\n\n"
              f"Última actividad: {last.get('start_date')}\n"
              f"Distancia: {last.get('distance',0)/1000:.2f} km\n"
              f"vVO2max estimada: {m_l['vvo2max']:.2f} km/h\n"
              f"Economía: {m_l['economy']:.2f} m/latido\n"
              f"Estado: {status}\n"
          )

          with open("ATHLETE_DOSSIER.md", "w", encoding="utf-8") as f:
              f.write(dossier)

          today = datetime.now()
          plan = [f"- {(today + timedelta(days=i)).strftime('%A')}: Rodaje Z2" for i in range(7)]
          with open("TRAINING_PLAN.md","w", encoding="utf-8") as f:
              f.write("# PLAN SEMANAL\n\n" + "\n".join(plan))
          EOF

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ATHLETE_DOSSIER.md TRAINING_PLAN.md data/activities_history.json
          git commit -m "Update training data [skip ci]" || echo "No changes"
          git push
