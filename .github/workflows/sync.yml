      - name: Sync Data
        env:
          ID: ${{ secrets.INTERVALS_ICU_ID }}
          KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: |
          python -c "
          import requests, os, json, base64
          from datetime import datetime, timedelta
          
          athlete_id = ''.join(filter(str.isdigit, os.environ.get('ID', '')))
          api_key = os.environ.get('KEY', '').strip()
          
          # Autenticación manual para evitar errores de librerías
          auth_str = f'API_KEY:{api_key}'
          encoded_auth = base64.b64encode(auth_str.encode()).decode()
          headers = {'Authorization': f'Basic {encoded_auth}'}
          
          oldest = (datetime.now() - timedelta(days=365)).strftime('%Y-%m-%d')
          url = f'https://intervals.icu/api/v1/athlete/{athlete_id}/activities'
          
          print(f'Intentando acceso al ID: {athlete_id}')
          response = requests.get(url, headers=headers, params={'oldest': oldest, 'limit': 30})
          
          if response.status_code == 200:
              os.makedirs('data', exist_ok=True)
              with open('data/activities_history.json', 'w') as f:
                  json.dump(response.json(), f, indent=2)
              print('¡Sincronización exitosa!')
          else:
              print(f'Error {response.status_code}: {response.text}')
              exit(1)
          "
