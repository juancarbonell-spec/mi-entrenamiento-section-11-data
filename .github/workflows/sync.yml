name: Full Training Engine V7

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync-and-analyze:
    runs-on: ubuntu-latest
    env:
      INTERVALS_API_KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
      INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ICU_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Full Training Engine V7 - Sync Activities
        run: |
          python << 'EOF'
          import requests, os, json
          from datetime import datetime, timedelta

          athlete_id = os.environ.get("INTERVALS_ATHLETE_ID","").strip()
          api_key = os.environ.get("INTERVALS_API_KEY","").strip()

          if not athlete_id or not api_key:
              print("❌ Faltan secrets INTERVALS")
              exit(1)

          url = f"https://intervals.icu/api/v1/athlete/0/activities"
          params = {"oldest": (datetime.now()-timedelta(days=365)).strftime("%Y-%m-%d")}

          r = requests.get(url, auth=("API_KEY", api_key), params=params, timeout=30)
          if r.status_code != 200:
              print("❌ Error sync:", r.text[:500])
              exit(1)

          activities = r.json()
          os.makedirs("data", exist_ok=True)
          file_path = "data/activities_history.json"
          with open(file_path,"w",encoding="utf-8") as f:
              json.dump(activities,f,indent=2,ensure_ascii=False)
          print(f"✅ {len(activities)} actividades sincronizadas y guardadas en {file_path}")
          EOF

      - name: Verificar contenido de data/
        run: ls -R data/

      - name: Subir JSON de actividades como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: activities_data
          path: data/activities_history.json

      - name: Generar dossier y plan avanzado
        run: |
          python << 'EOF'
          import os, json
          from datetime import datetime, timedelta

          # Tus zonas de FC
          Z4, Z5 = 148, 158

          def sec2min(s): return s/60 if s else 0

          # Cargar actividades
          with open("data/activities_history.json", "r", encoding="utf-8") as f:
              activities = json.load(f)

          # Filtrar solo carreras válidas
          runs = sorted([a for a in activities if a.get("type")=="Run"], key=lambda x: x.get("start_date",""))
          valid_runs = [r for r in runs if r.get("distance",0)/1000 >= 1 and sec2min(r.get("moving_time",0)) >= 10]

          if not valid_runs:
              print("⚠️ No hay carreras válidas")
              exit(0)

          last = valid_runs[-1]
          prev = valid_runs[-2] if len(valid_runs)>1 else last

          # Función de métricas básicas y avanzadas
          def analyze_run(a):
              d_km = a.get("distance",0)/1000
              t_min = sec2min(a.get("moving_time",0))
              pace = t_min/d_km if d_km>0 else 0
              hr = a.get("average_heartrate",0)

              # Ritmo a 160 ppm aproximado (fallback simple si no hay heartrate_data)
              hr_array = a.get("heartrate_data", [])  # opcional: lista de dicts {'hr':..., 'pace':...}
              if hr_array:
                  relevant = [r['pace'] for r in hr_array if 158 <= r['hr'] <= 162]
                  pace_160 = sum(relevant)/len(relevant) if relevant else pace
              else:
                  pace_160 = pace

              # vVO2max aproximada (km/h)
              vvo2max = d_km / (t_min/60) if t_min>0 else 0

              # Minutos en Z4/Z5 exactos
              time_z4 = sum(1 for r in hr_array if Z4 <= r['hr'] < Z5) if hr_array else 0
              time_z5 = sum(1 for r in hr_array if r['hr'] >= Z5) if hr_array else 0

              # Desacople aeróbico (% aumento de FC a lo largo de la carrera)
              if hr_array and len(hr_array) > 1:
                  fc_start = hr_array[0]['hr']
                  fc_end = hr_array[-1]['hr']
                  decoupling = ((fc_end - fc_start)/fc_start)*100 if fc_start>0 else 0
              else:
                  decoupling = 0

              # Economía de carrera (metros/latido)
              ec = (d_km*1000)/hr if hr>0 else 0

              return {
                  "pace": pace,
                  "hr": hr,
                  "pace_160": pace_160,
                  "vvo2max": vvo2max,
                  "time_z4": time_z4,
                  "time_z5": time_z5,
                  "decoupling": decoupling,
                  "economy": ec
              }

          metrics_last = analyze_run(last)
          metrics_prev = analyze_run(prev)

          status = "MEJORA clara" if metrics_last['hr'] < metrics_prev['hr'] and metrics_last['pace'] <= metrics_prev['pace'] else "SIN mejora clara"

          # Generar dossier avanzado
          dossier = (
              "# ATHLETE DOSSIER V7 AVANZADO\n\n"
              f"Última actividad: {last.get('start_date')}\n"
              f"Distancia: {last.get('distance',0)/1000:.2f} km\n"
              f"FC media: {metrics_last['hr']:.0f}\n"
              f"Ritmo medio: {metrics_last['pace']:.2f} min/km\n"
              f"Pace a 160 ppm: {metrics_last['pace_160']:.2f} min/km\n"
              f"vVO2max estimada: {metrics_last['vvo2max']:.2f} km/h\n"
              f"Minutos en Z4: {metrics_last['time_z4']}\n"
              f"Minutos en Z5: {metrics_last['time_z5']}\n"
              f"Desacople aeróbico: {metrics_last['decoupling']:.2f}%\n"
              f"Economía de carrera: {metrics_last['economy']:.2f} m/latido\n"
              f"Comparación con anterior: {status}\n"
          )

          with open("ATHLETE_DOSSIER.md", "w", encoding="utf-8") as f:
              f.write(dossier)
          print("✅ Dossier avanzado generado")

          # Plan semanal con días correctos según zona horaria
          today = datetime.now().astimezone()
          plan = []
          for i in range(7):
              day = today + timedelta(days=i)
              plan.append(f"- {day.strftime('%A')}: Rodaje Z2 45-60min")

          with open("TRAINING_PLAN.md","w", encoding="utf-8") as f:
              f.write("# PLAN SEMANAL SIMPLE V7\n\n")
              f.write("\n".join(plan))
          print("✅ Plan semanal V7 generado")
          EOF
