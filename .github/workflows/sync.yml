name: Intervals.icu Sync

on:
  schedule:
    - cron: '*/15 * * * *' # Se ejecuta cada 15 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Sync Data
        env:
          ID: ${{ secrets.INTERVALS_ICU_ID }}
          KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: |
          # Aquí se ejecutará el script de Section 11 para bajar tus datos
          # Por ahora, estamos preparando la estructura de carpetas
          mkdir -p data
          echo "Sincronización configurada correctamente" > data/status.txt
      - name: Commit and Push
        run: |
          git config --global user.name "Section 11 Bot"
          git config --global user.email "bot@section11.ai"
          git add .
          git commit -m "Update training data" || exit 0
          git push