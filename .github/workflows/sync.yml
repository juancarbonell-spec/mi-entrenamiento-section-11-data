name: Sync Health Data to Intervals.icu

on:
  schedule:
    - cron: '0 */6 * * *' # Se ejecuta cada 6 horas
  workflow_dispatch:      # Te permite darle al botón de "Run workflow" tú mismo

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descarga tu repositorio de datos
      - name: Checkout your repo
        uses: actions/checkout@v4

      # 2. Descarga la herramienta de sincronización en la carpeta section-11
        uses: actions/checkout@v4
        with:
          repository: CrankAddict/section-11
          path: section-11

      # 3. Configura Python de forma simple (sin caché conflictiva)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Instala las dependencias si el archivo existe
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f section-11/requirements.txt ]; then 
            pip install -r section-11/requirements.txt
          else
            echo "No se encontró requirements.txt en section-11/, se continúa de todas formas."
          fi

      # 5. Ejecuta la sincronización
      - name: Run Sync Script
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: |
          cd section-11
          python main.py
