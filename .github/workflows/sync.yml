name: Intervals.icu Sync

on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Sync Data (Download 30 Activities)
        env:
          ID: ${{ secrets.INTERVALS_ICU_ID }}
          KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: |
          python -c "
          import requests, os, json
          
          # Limpiamos el ID de la 'i' si existe para que la URL sea válida
          raw_id = os.environ.get('ID', '')
          athlete_id = ''.join(filter(str.isdigit, raw_id))
          api_key = os.environ.get('KEY', '')
          
          if not athlete_id or not api_key:
              print('Error: Faltan credenciales')
              exit(1)
          
          url = f'https://intervals.icu/api/v1/athlete/{athlete_id}/activities'
          response = requests.get(url, auth=('API_KEY', api_key), params={'limit': 30})
          
          if response.status_code == 200:
              os.makedirs('data', exist_ok=True)
              with open('data/activities_history.json', 'w') as f:
                  json.dump(response.json(), f, indent=2)
              print('Datos descargados correctamente')
          else:
              print(f'Error: {response.status_code} - {response.text}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Section 11 Bot"
          git config --global user.email "bot@section11.ai"
          git add .
          git commit -m "Update training data with actual activities" || exit 0
          git push
