      - name: Sync Data
        env:
          INTERVALS_ID: ${{ secrets.INTERVALS_ICU_ID }}
          INTERVALS_KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: |
          python -c '
import requests
import os
import json
from datetime import datetime, timedelta

athlete_id = os.environ.get("INTERVALS_ID", "").strip()
api_key    = os.environ.get("INTERVALS_KEY", "").strip()

if not athlete_id or not api_key:
    print("❌ Error: Faltan los secrets INTERVALS_ICU_ID o INTERVALS_ICU_API_KEY")
    exit(1)

# Recomendado: usar "0" en vez del ID largo (funciona mejor con API Key personal)
url = f"https://intervals.icu/api/v1/athlete/0/activities"

params = {
    "oldest": (datetime.now() - timedelta(days=365)).strftime("%Y-%m-%d"),
    # "newest": datetime.now().strftime("%Y-%m-%d"),   # opcional
    # "limit": 200                                     # opcional
}

headers = {
    "Accept": "application/json"
}

# Autenticación correcta (requests se encarga del base64)
auth = ("API_KEY", api_key)

print(f"🔄 Conectando a Intervals.icu (athlete: {athlete_id})...")

r = requests.get(url, auth=auth, headers=headers, params=params, timeout=30)

print(f"Status: {r.status_code}")

if r.status_code == 200:
    data = r.json()
    os.makedirs("data", exist_ok=True)
    
    with open("data/activities_history.json", "w", encoding="utf-8") as f:
        json.dump(data, f, indent=2, ensure_ascii=False)
    
    print(f"✅ Sincronización OK - {len(data)} actividades guardadas")
else:
    print("❌ Error en la petición:")
    print(r.text[:1000])   # mostramos parte del error
    exit(1)
          '
