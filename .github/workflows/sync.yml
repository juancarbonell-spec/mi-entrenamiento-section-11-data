name: Full Training Engine V8.1 - Road to 48
on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch:
jobs:
  sync-and-analyze:
    runs-on: ubuntu-latest
    env:
      INTERVALS_API_KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
      INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ICU_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests

      - name: Sync, Analyze and Generate Dossier
        run: |
          python << 'EOF'
          import requests, os, json
          from datetime import datetime, timedelta

          athlete_id = os.environ.get("INTERVALS_ATHLETE_ID","").strip()
          api_key = os.environ.get("INTERVALS_API_KEY","").strip()
          os.makedirs("data", exist_ok=True)

          def get_intervals_data(endpoint):
              url = f"https://intervals.icu/api/v1/athlete/{athlete_id}/{endpoint}"
              try:
                  r = requests.get(url, auth=("athlete", api_key), timeout=30)
                  if r.status_code == 200:
                      data = r.json()
                      if data and len(data) > 0:
                          return data
                  print(f"⚠️ Error o vacío en {endpoint}: {r.status_code}")
              except Exception as e:
                  print(f"❌ Error conexión {endpoint}: {e}")
              return None

          # 1. DESCARGA SEGURA
          activities = get_intervals_data("activities")
          wellness = get_intervals_data("wellness")

          if activities:
              # ORDENAR: El más reciente siempre es el índice [0]
              activities.sort(key=lambda x: x.get("start_date_local", ""), reverse=True)
              with open("data/activities_history.json", "w", encoding="utf-8") as f:
                  json.dump(activities, f, indent=2, ensure_ascii=False)

          if wellness:
              wellness.sort(key=lambda x: x.get("id", ""), reverse=True)
              with open("data/wellness_history.json", "w", encoding="utf-8") as f:
                  json.dump(wellness, f, indent=2, ensure_ascii=False)

          # 2. ANÁLISIS (Corrección de los 10km)
          if activities:
              runs = [a for a in activities if a.get("type") == "Run" and a.get("distance", 0) > 1500]
              if runs:
                  # Tomamos la más reciente (que ahora es la primera gracias al sort)
                  last = runs[0]
                  # Si la más reciente es un "Lap" pequeño (< 7km) pero hay otra el mismo día más grande, intentamos buscar la sesión completa
                  # Pero con el sort 'reverse=True' de Garmin, la sesión completa suele ser la que entra última y se pone arriba.
                  
                  prev = runs[1] if len(runs) > 1 else last
                  
                  def get_metrics(a):
                      d_km = a.get("distance", 0) / 1000
                      t_h = (a.get("moving_time", 0)) / 3600
                      hr = a.get("average_heartrate", 0)
                      vvo2max = d_km / t_h if t_h > 0 else 0
                      # Economía: Metros por latido total en la sesión
                      economy = (d_km * 1000) / (hr * (a.get("moving_time", 0) / 60)) if hr > 0 and a.get("moving_time", 0) > 0 else 0
                      return {"v": vvo2max, "hr": hr, "ec": economy, "dist": d_km, "date": a.get("start_date_local", "")[:10]}

                  m_l = get_metrics(last)
                  m_p = get_metrics(prev)

                  # Buscar VO2max en wellness
                  current_vo2 = "Pendiente"
                  if wellness:
                      for day in wellness:
                          if day.get("vo2max"):
                              current_vo2 = day.get("vo2max")
                              break

                  dossier = (
                      f"# ATHLETE DOSSIER V8.1\n\n"
                      f"**Última Carrera Analizada:** {m_l['date']}\n"
                      f"- **Distancia:** {m_l['dist']:.2f} km ✅\n"
                      f"- **vVO2max Actual:** {m_l['v']:.2f} km/h\n"
                      f"- **FC Media:** {m_l['hr']:.0f} ppm\n"
                      f"- **Economía de carrera:** {m_l['ec']:.2f} m/latido\n"
                      f"- **VO2max (Garmin):** {current_vo2}\n\n"
                      f"**Estado del Objetivo 48.0:** {'🚀 ¡CONSEGUIDO!' if isinstance(current_vo2, float) and current_vo2 >= 48 else '📈 En camino'}\n"
                  )
                  with open("ATHLETE_DOSSIER.md", "w", encoding="utf-8") as f:
                      f.write(dossier)
          EOF

      - name: Push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ATHLETE_DOSSIER.md data/*.json
          git commit -m "Update Dossier and Data [skip ci]" || echo "No changes"
          git push
