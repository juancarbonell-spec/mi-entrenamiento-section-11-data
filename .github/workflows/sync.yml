      - name: Fetch Last 30 Activities
        env:
          # Asegúrate de que estos nombres coincidan EXACTAMENTE con tus Settings > Secrets
          ID: ${{ secrets.INTERVALS_ICU_ID }}
          KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: |
          python -c "
          import requests, os, json
          
          # Intentamos capturar los secretos
          raw_id = os.environ.get('ID', '')
          api_key = os.environ.get('KEY', '')
          
          # Limpiamos el ID de cualquier letra 'i' o espacios
          athlete_id = ''.join(filter(str.isdigit, raw_id))
          
          if not athlete_id or not api_key:
              print(f'ERROR CRÍTICO: ID detectado: \"{athlete_id}\". API_KEY detectada: {\"SÍ\" if api_key else \"NO\"}.')
              print('Revisa Settings > Secrets and variables > Actions')
              exit(1)

          url = f'https://intervals.icu/api/v1/athlete/{athlete_id}/activities?limit=30'
          print(f'Conectando a: https://intervals.icu/api/v1/athlete/{athlete_id}/activities')
          
          response = requests.get(url, auth=('API_KEY', api_key))
          
          if response.status_code == 200:
              os.makedirs('data', exist_ok=True)
              with open('data/activities_history.json', 'w') as f:
                  json.dump(response.json(), f, indent=2)
              print('Sincronización exitosa: 30 actividades guardadas.')
          else:
              print(f'Error {response.status_code}: {response.text}')
              exit(1)
          "
