<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training - Juan Carbonell</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mapbox/polyline@1.1.1/src/polyline.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            color: #1d1d1f; 
            font-weight: 300; 
            margin-bottom: 30px;
            font-size: 2em;
        }

        /* FUERZA COLUMNA ÚNICA (ESTILO MÓVIL) */
        #activities-list { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            width: 100%;
            max-width: 550px; /* Ancho ideal para lectura vertical */
            margin: 0 auto; 
        }

        .card { 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.06); 
            padding: 25px; 
            transition: transform 0.2s;
        }

        .card-header { margin-bottom: 15px; }

        .card-title { 
            font-weight: bold; 
            font-size: 1.3em; 
            color: #fc4c02; /* Naranja Strava */
            line-height: 1.2;
        }

        .card-date {
            color: #888;
            font-size: 0.9em;
            margin-top: 4px;
            display: block;
        }

        .stats { 
            font-size: 1em; 
            color: #444; 
            margin-bottom: 15px; 
            font-weight: 500;
        }

        .map-mini { 
            height: 250px; 
            width: 100%; 
            border-radius: 15px; 
            margin-top: 10px; 
            cursor: pointer; 
            background: #f8f9fa; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            border: 1px solid #eee; 
        }

        /* MANCUERNAS MÁS GRANDES */
        .no-gps-img { 
            width: 140px; 
            height: 140px; 
            opacity: 0.7; 
        }

        .zone-badge { 
            display: inline-block; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 0.8em; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        .z4 { background: #ffe0b2; color: #e65100; border: 1px solid #ffcc80; }
        .z5 { background: #ffcdd2; color: #b71c1c; border: 1px solid #ef9a9a; }

        /* MODAL MAPA GRANDE */
        #modal-map { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
        }
        #big-map { width: 90%; height: 80%; border-radius: 15px; }
    </style>
</head>
<body>

<h1>Mis Actividades</h1>

<div id="activities-list">Sincronizando con Strava...</div>

<div id="modal-map" onclick="this.style.display='none'">
    <div id="big-map" onclick="event.stopPropagation()"></div>
</div>

<script>
    // TUS CREDENCIALES
    const CLIENT_ID = '94229';
    const CLIENT_SECRET = '1ee16d3138e7094a3e6e0729c9f874485353539a';
    const REFRESH_TOKEN = 'e788bea11b2b03b25051c26cc3914ebb61544f08';

    async function getAccessToken() {
        const res = await fetch('https://www.strava.com/api/v3/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                client_id: CLIENT_ID,
                client_secret: CLIENT_SECRET,
                refresh_token: REFRESH_TOKEN,
                grant_type: 'refresh_token'
            })
        });
        const data = await res.json();
        return data.access_token;
    }

    async function init() {
        try {
            const token = await getAccessToken();
            const res = await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=30`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const activities = await res.json();
            render(activities);
        } catch (e) {
            document.getElementById('activities-list').innerText = "Error al conectar con Strava.";
        }
    }

    function render(activities) {
        const list = document.getElementById('activities-list');
        list.innerHTML = '';

        activities.forEach((act, i) => {
            const avgHR = act.average_heartrate || 0;
            const distKm = act.distance / 1000;
            
            // CAMBIO: Usamos moving_time para ignorar las pausas de Garmin
            const timeMin = (act.moving_time / 60).toFixed(0);
            
            const displayDistance = distKm > 0 ? ` | ${distKm.toFixed(2)} km` : '';
            
            let zoneHtml = '';
            if (avgHR >= 158) zoneHtml = '<span class="zone-badge z5">Zona 5</span>';
            else if (avgHR >= 148) zoneHtml = '<span class="zone-badge z4">Zona 4</span>';

            const card = document.createElement('div');
            card.className = 'card';
            
            const hasGPS = act.map && act.map.summary_polyline;
            const mapContent = hasGPS 
                ? '' 
                : `<img src="https://cdn-icons-png.flaticon.com/512/2548/2548537.png" class="no-gps-img" alt="Gimnasio">`;

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">${act.name}</div>
                    <span class="card-date">${new Date(act.start_date_local).toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' })}</span>
                </div>
                <div class="stats">
                    ${act.type}${displayDistance} | ${timeMin} min
                    <br>${zoneHtml}
                </div>
                <div id="map-${i}" class="map-mini">${mapContent}</div>
            `;
            list.appendChild(card);

            if (hasGPS) {
                renderMap(`map-${i}`, act.map.summary_polyline);
            }
        });
    }

    function renderMap(elementId, encodedPoly) {
        const coords = polyline.decode(encodedPoly);
        const map = L.map(elementId, {
            zoomControl: false, 
            attributionControl: false, 
            dragging: false, 
            touchZoom: false, 
            scrollWheelZoom: false, 
            doubleClickZoom: false
        }).setView(coords[0], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const path = L.polyline(coords, {color: '#ff4d4d', weight: 4}).addTo(map);
        map.fitBounds(path.getBounds());

        document.getElementById(elementId).onclick = () => {
            const modal = document.getElementById('modal-map');
            modal.style.display = 'flex';
            const bigMapDiv = document.getElementById('big-map');
            
            if (window.bigMapInstance) window.bigMapInstance.remove();
            
            window.bigMapInstance = L.map('big-map').setView(coords[0], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window.bigMapInstance);
            L.polyline(coords, {color: '#ff4d4d', weight: 6}).addTo(window.bigMapInstance);
            window.bigMapInstance.fitBounds(path.getBounds());
        };
    }

    init();
</script>
</body>
</html>
