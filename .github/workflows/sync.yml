name: Full Training Engine

on:
  schedule:
    - cron: '0 6 * * *'  # se ejecuta cada día a las 6:00
  workflow_dispatch:

jobs:
  sync-and-analyze:
    runs-on: ubuntu-latest
    env:
      INTERVALS_API_KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
      INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ICU_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Full Training Engine (V2→V6)
        run: |
          python << 'EOF'
          import requests, os, json, re
          from datetime import datetime, timedelta

          # -----------------------------
          # 1️⃣ Sync Activities
          # -----------------------------
          athlete_id = os.environ.get("INTERVALS_ATHLETE_ID","").strip()
          api_key = os.environ.get("INTERVALS_API_KEY","").strip()

          if not athlete_id or not api_key:
              print("❌ Faltan secrets INTERVALS")
              exit(1)

          url = f"https://intervals.icu/api/v1/athlete/0/activities"
          params = {"oldest": (datetime.now()-timedelta(days=365)).strftime("%Y-%m-%d")}

          r = requests.get(url, auth=("API_KEY", api_key), params=params, timeout=30)
          if r.status_code != 200:
              print("❌ Error sync:", r.text[:500])
              exit(1)

          activities = r.json()
          os.makedirs("data", exist_ok=True)
          with open("data/activities_history.json","w",encoding="utf-8") as f:
              json.dump(activities,f,indent=2,ensure_ascii=False)
          print(f"✅ {len(activities)} actividades sincronizadas")

          # -----------------------------
          # 2️⃣ Filtrar runs
          # -----------------------------
          Z4, Z5 = 148, 158
          runs = sorted([a for a in activities if a.get("type")=="Run"], key=lambda x: x.get("start_date",""))
          if len(runs)<2: print("⚠️ Pocos datos aún")

          last = runs[-1]
          prev = runs[-2] if len(runs)>1 else last

          # -----------------------------
          # 3️⃣ Obtener streams detalle
          # -----------------------------
          def get_streams(act_id):
              r = requests.get(f"https://intervals.icu/api/v1/activity/{act_id}", auth=("API_KEY", api_key), timeout=30)
              if r.status_code != 200: exit(1)
              d = r.json()
              return d.get("heartrate",[]), d.get("velocity",[])

          hr, sp = get_streams(last["id"])
          pace = [(1000/(v*60)) if v>0 else 0 for v in sp]

          # -----------------------------
          # 4️⃣ Detectar bloques Z4/Z5
          # -----------------------------
          blocks=[]
          current=None
          for i,h in enumerate(hr):
              if h>=Z4:
                  if not current: current={'start':i,'max_hr':h}
                  current['max_hr']=max(current['max_hr'],h)
              else:
                  if current: current['end']=i; blocks.append(current); current=None
          for b in blocks: b['duration']=(b['end']-b['start'])/60

          # -----------------------------
          # 5️⃣ Desacople aeróbico
          # -----------------------------
          half=len(hr)//2
          def avg(x): return sum(x)/len(x) if x else 0
          hr1,hr2 = avg(hr[:half]), avg(hr[half:])
          p1=avg([p for p in pace[:half] if p>0])
          p2=avg([p for p in pace[half:] if p>0])
          dec=((hr2/p2)/(hr1/p1)-1)*100 if p1 and p2 else 0

          # -----------------------------
          # 6️⃣ Eficiencia y vVO2max
          # -----------------------------
          speed_kmh=[v*3.6 for v in sp if v>0]
          avg_speed=avg(speed_kmh)
          avg_hr=avg(hr)
          efficiency=avg_speed/avg_hr if avg_hr else 0

          def estimate_vvo2(a):
              d=a.get("distance",0)/1000
              t=a.get("moving_time",1)/3600
              return (d/t)*1.08 if t>0 else 0
          v_series=[estimate_vvo2(r) for r in runs[-10:]]
          v_trend=sum(v_series)/len(v_series)

          # -----------------------------
          # 7️⃣ Carga (CTL/ATL)
          # -----------------------------
          loads=[r.get("moving_time",0)/60 for r in runs[-30:]]
          ctl=sum(loads)/len(loads) if loads else 0
          atl=sum(loads[-7:])/7 if len(loads)>=7 else ctl
          fatigue=atl-ctl

          # -----------------------------
          # 8️⃣ Mejora última sesión
          # -----------------------------
          def basic_metrics(a):
              d=a.get("distance",0)/1000
              t=a.get("moving_time",1)/60
              hr=a.get("average_heartrate",0)
              pace=t/d if d>0 else 0
              return pace, hr
          p_last, hr_last=basic_metrics(last)
          p_prev, hr_prev=basic_metrics(prev)
          if hr_last<hr_prev and p_last<=p_prev: status="MEJORA clara (↓FC mismo ritmo)"
          elif p_last<p_prev and hr_last<=hr_prev: status="MEJORA rendimiento (↑ritmo)"
          else: status="SIN mejora clara"

          # -----------------------------
          # 9️⃣ Generar dossier V4
          # -----------------------------
          dossier=f'''
# ATHLETE DOSSIER V4

## Última actividad
- Fecha: {last.get('start_date')}
- Distancia: {last.get('distance',0)/1000:.2f} km
- FC media: {avg_hr:.0f}

## Intensidad
- Bloques Z4/Z5 detectados: {len(blocks)}

## Base aeróbica
- Desacople: {dec:.2f} %

## Eficiencia
- Speed/HR: {efficiency:.4f}
- vVO2max: {v_trend:.2f} km/h

## Comparación última sesión
- {status}
- Fatiga (ATL-CTL): {fatigue:.1f}
'''
          with open("ATHLETE_DOSSIER.md","w") as f: f.write(dossier)
          print("✅ Dossier V4 generado")

          # -----------------------------
          # 10️⃣ Plan adaptativo V5 y ajuste V6
          # -----------------------------
          def vo2_session(): return "VO2max: 5x3' Z5 (rec 2') + calentamiento/enfriamiento"
          def base_session(): return "Rodaje Z2 45-60min estable"
          def recovery(): return "30-40min muy suave Z1-Z2"
          def tempo(): return "Tempo: 20min Z3-Z4 controlado"

          today=datetime.today()
          plan=[]
          state=""
          if fatigue>10: state="fatigado"
          elif dec>5: state="base_debil"
          else: state="listo"

          for i in range(7):
              day=today+timedelta(days=i)
              if state=="fatigado": session=recovery()
              elif state=="base_debil":
                  session=tempo() if i in [2,5] else base_session()
              else:
                  session=vo2_session() if i in [1,4] else (recovery() if i==6 else base_session())
              plan.append((day.strftime("%A"), session))

          # Periodización 4 semanas
          week_number=int(today.strftime("%U"))
          phase=week_number%4
          block="descarga" if phase==3 else "carga"
          new_plan=[]
          for d,s in plan:
              if state=="fatigado": new_s="RECOVERY 30min Z1-Z2"
              elif state=="base_debil" and "VO2max" in s: new_s="Z2 45min (sustituye intensidad)"
              elif block=="descarga" and "VO2max" in s: new_s="VO2 reducido: 3x3' Z4"
              else: new_s=s
              new_plan.append((d,new_s))

          output=f"# PLAN SEMANAL ADAPTATIVO V6\n\nBloque: {block}\nEstado: {state}\nTendencia VO2max: {v_trend:.2f}\n\n## PLAN AJUSTADO\n"
          for d,s in new_plan: output+=f"- {d}: {s}\n"

          with open("TRAINING_PLAN.md","w") as f: f.write(output)
          print("✅ Plan V6 generado con ajuste dinámico")
          EOF
