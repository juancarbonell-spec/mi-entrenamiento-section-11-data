name: Intervals.icu Sync (30 Activities)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests

      - name: Fetch Last 30 Activities
        env:
          ID: ${{ secrets.INTERVALS_ICU_ID }}
          KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
        run: |
          python -c "
          import requests, os, json
          # Limpieza automática de la 'i' y espacios
          athlete_id = os.environ['ID'].strip().lstrip('i')
          api_key = os.environ['KEY'].strip()
          
          url = f'https://intervals.icu/api/v1/athlete/{athlete_id}/activities?limit=30'
          response = requests.get(url, auth=('API_KEY', api_key))
          
          if response.status_code == 200:
              os.makedirs('data', exist_ok=True)
              with open('data/activities_history.json', 'w') as f:
                  json.dump(response.json(), f, indent=2)
              print('Sincronización completada con éxito.')
          else:
              print(f'Error {response.status_code}: {response.text}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Section 11 Bot"
          git config --global user.email "bot@section11.ai"
          git add data/activities_history.json
          git commit -m "Update 30 activities history" || exit 0
          git push
