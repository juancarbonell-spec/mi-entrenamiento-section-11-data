name: Sync Intervals.icu Data

on:
  schedule:
    - cron: '*/15 * * * *' # Se ejecuta cada 15 minutos
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: |
          python - <<EOF
          import requests
          import json
          import os

          api_key = os.getenv('API_KEY')
          athlete_id = os.getenv('ATHLETE_ID')

          def save_json(url, filename, sort_key=None):
              print(f"Descargando datos de: {url}")
              try:
                  response = requests.get(url, auth=('athlete', api_key), timeout=30)
                  if response.status_code == 200:
                      data = response.json()
                      if data and isinstance(data, list):
                          if sort_key:
                              # Ordenamos de más reciente a más antiguo
                              data.sort(key=lambda x: x.get(sort_key, ''), reverse=True)
                          
                          os.makedirs('data', exist_ok=True)
                          with open(f'data/{filename}', 'w') as f:
                              json.dump(data, f, indent=4)
                          print(f"✅ Guardado correctamente: {filename} ({len(data)} registros)")
                      else:
                          print(f"⚠️ Datos vacíos o formato incorrecto en {filename}")
                  else:
                      print(f"❌ Error API {response.status_code} en {filename}")
              except Exception as e:
                  print(f"💥 Error crítico en {filename}: {str(e)}")

          # 1. Sincronizar Actividades (Ordenadas por fecha)
          save_json(
              f"https://intervals.icu/api/v1/athlete/{athlete_id}/activities", 
              "activities_history.json", 
              sort_key="start_date_local"
          )

          # 2. Sincronizar Wellness (Donde está tu VO2max)
          save_json(
              f"https://intervals.icu/api/v1/athlete/{athlete_id}/wellness", 
              "wellness_history.json", 
              sort_key="id"
          )
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización de datos: $(date)" && git push)
