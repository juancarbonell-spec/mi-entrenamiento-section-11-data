name: Sync

on:
  schedule:
    - cron: '0 6-15 * * *'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download Metrics
        run: |
          curl -o data/activities.json https://intervals.icu/api/activities
          curl -o data/sleep.json https://intervals.icu/api/sleep
          curl -o data/spo2.json https://intervals.icu/api/spo2
          curl -o data/hrv.json https://intervals.icu/api/hrv
          curl -o data/respiration.json https://intervals.icu/api/respiration
          curl -o data/steps.json https://intervals.icu/api/steps
          curl -o data/heartrate.json https://intervals.icu/api/heartrate
          curl -o data/peso.json https://intervals.icu/api/peso

  analyze:
    runs-on: ubuntu-latest
    needs: download
    steps:
      - name: Analyze Data
        run: |
          python analyze.py

  generate_dossier:
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Generate Dossier
        run: |
          python generate_dossier.py
