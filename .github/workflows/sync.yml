name: Sync Health Data to Intervals.icu

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # Paso 1: Tu repositorio
      - name: Checkout your repo
        uses: actions/checkout@v4

      # Paso 2: El repositorio de la herramienta (IMPORTANTE el guion al principio)
      - name: Checkout sync tool repository
        uses: actions/checkout@v4
        with:
          repository: CrankAddict/section-11
          path: section-11

      # Paso 3: Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Paso 4: Instalar dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f section-11/requirements.txt ]; then 
            pip install -r section-11/requirements.txt
          fi

      # Paso 5: Ejecutar la sincronización
      - name: Run Sync Script
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: |
          cd section-11
          python main.py
