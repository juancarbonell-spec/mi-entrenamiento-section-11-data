name: Sync Health Data to Intervals.icu

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Checkout sync tool repository
        uses: actions/checkout@v4
        with:
          repository: CrankAddict/section-11
          path: section-11

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f section-11/requirements.txt ]; then 
            pip install -r section-11/requirements.txt
          fi

      - name: Run Sync Script
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: |
          # 1. Listamos los archivos para ver qué hay realmente (esto saldrá en el log)
          echo "Contenido de la carpeta section-11:"
          ls -R section-11
          
          # 2. Intentamos ejecutar el script principal. 
          # Si no es main.py, cámbialo por el nombre que veas en el paso anterior.
          cd section-11
          if [ -f "main.py" ]; then
            python main.py
          elif [ -f "sync.py" ]; then
            python sync.py
          else
            echo "ERROR: No se encuentra main.py ni sync.py. Revisa el listado de arriba."
            exit 1
          fi
