name: Sync Health Data to Intervals.icu

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # 1. Soluciona el aviso de deprecación de Node.js 20
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      # 2. Descarga tu repositorio de datos
      - name: Checkout your repo
        uses: actions/checkout@v4

      # 3. Descarga la herramienta de sincronización en una subcarpeta
      - name: Checkout sync tool repository
        uses: actions/checkout@v4
        with:
          repository: CrankAddict/section-11
          path: section-11

      # 4. Configura Python con la ruta de caché correcta
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          # Especificamos dónde está el archivo para que no de error
          cache-dependency-path: 'section-11/requirements.txt'

      # 5. Instala las dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f section-11/requirements.txt ]; then 
            pip install -r section-11/requirements.txt
          fi

      # 6. Ejecuta la sincronización entrando en la carpeta
      - name: Run Sync Script
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: |
          cd section-11
          python main.py
