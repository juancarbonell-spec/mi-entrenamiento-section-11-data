<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades de Juan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8f9fa; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid #eee; }
        .header h1 { margin: 0; font-size: 18px; color: #333; }
        .header p { margin: 5px 0 0; font-size: 14px; color: #777; }
        
        .activity-card { display: flex; padding: 12px; border-bottom: 1px solid #eee; transition: background 0.2s; }
        .activity-card:last-child { border-bottom: none; }
        
        .map-thumb { width: 80px; height: 80px; border-radius: 4px; background: #eee; flex-shrink: 0; overflow: hidden; position: relative; }
        .map-instance { width: 100%; height: 100%; }
        
        .activity-info { margin-left: 15px; flex-grow: 1; }
        .activity-name { margin: 0; font-size: 15px; color: #007fb8; text-decoration: none; font-weight: 500; cursor: pointer; }
        .activity-stats { margin: 4px 0; font-size: 13px; color: #555; display: flex; gap: 10px; }
        .activity-date { margin: 0; font-size: 12px; color: #999; text-transform: lowercase; }
        
        .no-gps { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 10px; color: #aaa; text-align: center; padding: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Juan C</h1>
            <p>Últimas carreras</p>
        </div>
        <div id="activities-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const JSON_URL = 'https://raw.githubusercontent.com/juancarbonell-spec/mi-entrenamiento-section-11-data/refs/heads/main/data/activities_history.json';

        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return [h, m, s].map(v => v < 10 ? "0" + v : v).filter((v,i) => v !== "00" || i > 0).join(":");
        }

        async function loadData() {
            try {
                const response = await fetch(JSON_URL);
                const data = await response.json();
                
                // Ordenar por fecha (start_date)
                const sorted = data.sort((a, b) => new Date(b.start_date) - new Date(a.start_date)).slice(0, 10);
                
                const list = document.getElementById('activities-list');
                list.innerHTML = '';

                sorted.forEach((act, i) => {
                    const date = new Date(act.start_date);
                    const dateStr = date.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                    
                    const dist = (act.distance / 1000).toFixed(1).replace('.', ',');
                    const time = formatDuration(act.moving_time);
                    const ele = act.total_elevation_gain ? Math.round(act.total_elevation_gain) + ' m' : '--';

                    const card = document.createElement('div');
                    card.className = 'activity-card';
                    card.innerHTML = `
                        <div class="map-thumb" id="map-${i}"></div>
                        <div class="activity-info">
                            <h2 class="activity-name">${act.name || act.type}</h2>
                            <div class="activity-stats">
                                <span>${dist} km</span>
                                <span>${time}</span>
                                <span>${ele}</span>
                            </div>
                            <p class="activity-date">${dateStr}</p>
                        </div>
                    `;
                    list.appendChild(card);

                    // Buscar polylines en campos comunes (map.summary_polyline o polyline)
                    const pLine = (act.map && act.map.summary_polyline) || act.polyline || act.summary_polyline;

                    if (pLine) {
                        const map = L.map(`map-${i}`, { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false });
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        try {
                            const coords = decodePolyline(pLine);
                            const poly = L.polyline(coords, {color: '#ff4400', weight: 3}).addTo(map);
                            map.fitBounds(poly.getBounds());
                        } catch(e) { console.error(e); }
                    } else {
                        document.getElementById(`map-${i}`).innerHTML = '<div class="no-gps">Sin datos GPS</div>';
                    }
                });
            } catch (e) {
                console.error(e);
                document.getElementById('activities-list').innerHTML = '<p style="padding:20px">Error cargando actividades.</p>';
            }
        }

        function decodePolyline(str) {
            let index = 0, lat = 0, lng = 0, coordinates = [], shift = 0, result = 0, byte = null, lat_change, lng_change;
            while (index < str.length) {
                byte = null; shift = 0; result = 0;
                do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
                lat_change = ((result & 1) ? ~(result >> 1) : (result >> 1)); lat += lat_change;
                shift = 0; result = 0;
                do { byte = str.charCodeAt(index++) - 63; result |= (byte & 0x1f) << shift; shift += 5; } while (byte >= 0x20);
                lng_change = ((result & 1) ? ~(result >> 1) : (result >> 1)); lng += lng_change;
                coordinates.push([lat / 1e5, lng / 1e5]);
            }
            return coordinates;
        }

        loadData();
    </script>
</body>
</html>
