name: Procesar FIT y actualizar CSVs

on:
  push:
    paths:
      - "FIT/**.fit"          # se dispara solo cuando se sube un .fit nuevo
  workflow_dispatch:           # también se puede lanzar manualmente desde la web

jobs:
  procesar:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # necesario para hacer el commit de vuelta

    steps:
      # 1. Descargar el repo completo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: pip install fitdecode pandas numpy

      # 4. Ejecutar el script de procesado
      - name: Procesar archivos FIT
        run: python scripts/procesar_fit.py

      # 5. Hacer commit de los CSVs generados (solo si hay cambios)
      - name: Commit y push de resultados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/running_60d_full.csv \
                  data/running_60d_summary.csv \
                  data/running_comparacion.txt \
                  data/cycling_60d_full.csv \
                  data/cycling_60d_summary.csv \
                  data/cycling_comparacion.txt
          git diff --cached --quiet || git commit -m "Auto: actualizar CSVs tras nuevo FIT [skip ci]"
          git push
